<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>Embrace Change Acquisition Corp.</title>
    <meta name="description" content="Embrace Change Acquisition Corp." />
    <meta name="theme-color" content="#fafafa" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --color-primary: #000000;
        --color-background: #fafafa;
        --font-family-primary: "EB Garamond", "Times New Roman", Times, serif;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: var(--color-background);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-primary);
        font-family: var(--font-family-primary);
        font-weight: 400;
        line-height: 1.2;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-feature-settings: "kern", "liga";
        user-select: none;
      }

      .wordmark {
        text-align: center;
        letter-spacing: -0.01em;
        white-space: nowrap;
        font-size: 80px; /* placeholder; replaced by JS auto-fit */
      }

      .wordmark.wrap {
        white-space: normal;
      }

      .wordmark .typed {
        white-space: pre;
      }

      /* Hidden phantom used only for measuring the full text width. */
      .wordmark .phantom {
        visibility: hidden;
        position: absolute;
        pointer-events: none;
        white-space: pre;
        font-size: 100px; /* fixed baseline for measurement */
        top: 0;
        left: 0;
      }

      .wordmark .cursor {
        display: inline-block;
        width: 0.06em;
        height: 0.85em;
        background-color: var(--color-primary);
        vertical-align: -0.08em;
        animation: cursor-blink 1.1s steps(1, end) infinite;
      }

      @keyframes cursor-blink {
        0%, 50% { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .wordmark .cursor { animation: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="wordmark"><span class="phantom" aria-hidden="true">Embrace Change Acquisition Corp.</span><span class="typed"></span><span class="cursor" aria-hidden="true"></span></h1>
    </main>
    <script>
      (function () {
        var text = "Embrace Change Acquisition Corp.";
        var wm = document.querySelector(".wordmark");
        var typed = wm.querySelector(".typed");
        var startDelay = 1600;
        var letterInterval = 130;
        var wordPause = 380;

        // Hidden phantom span holds the full text at a fixed 100px font-size.
        // Its width is a reliable measurement of how wide the text would be.
        var BASE = 100;
        var phantom = wm.querySelector(".phantom");

        function fit() {
          var naturalWidth = phantom.getBoundingClientRect().width;
          if (!naturalWidth) return; // fonts not ready yet
          var target = window.innerWidth * 0.85;
          var size = (target / naturalWidth) * BASE;
          if (size > 160) size = 160;
          // On very narrow screens, allow wrapping and use a readable size.
          if (size < 28) {
            wm.classList.add("wrap");
            size = Math.max(30, Math.min(window.innerWidth * 0.09, 52));
          } else {
            wm.classList.remove("wrap");
          }
          wm.style.fontSize = size + "px";
        }

        function type() {
          var t = startDelay;
          for (var i = 0; i < text.length; i++) {
            var ch = text.charAt(i);
            (function (c, time) {
              setTimeout(function () {
                typed.append(c);
              }, time);
            })(ch, t);
            t += letterInterval;
            if (ch === " ") t += wordPause;
          }
        }

        function init() {
          fit();
          type();
        }

        window.addEventListener("resize", fit);

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(init);
        } else {
          window.addEventListener("load", init);
        }
      })();
    </script>
  </body>
</html>
